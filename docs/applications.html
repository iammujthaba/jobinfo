<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Applications – JobInfo Recruiter</title>
  <meta name="description" content="View and manage job applications on JobInfo.">
  <meta name="robots" content="noindex, nofollow">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Raleway:wght@500;600;700&display=swap" rel="stylesheet">
  <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/css/main.css" rel="stylesheet">

  <style>
    :root { --ji-green:#25d366; --ji-dark:#1a1a2e; --ji-bg:#f4f6fb; }
    body { background:var(--ji-bg); font-family:Roboto,sans-serif; }

    /* ── Top bar ──────────────────────────────────── */
    .top-bar { background:var(--ji-dark);color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between; }
    .top-bar .brand { font-size:1.1rem;font-weight:700; }
    .top-bar .brand span { color:var(--ji-green); }
    .sub-label { font-size:.8rem;color:#cdd5f3; }
    .btn-logout { background:none;border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:8px;padding:5px 14px;font-size:.78rem;cursor:pointer;transition:all .2s; }
    .btn-logout:hover { background:rgba(255,255,255,.1); }
    .btn-back { background:none;border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:8px;padding:5px 14px;font-size:.78rem;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:6px; }
    .btn-back:hover { background:rgba(255,255,255,.1);color:#fff; }

    /* ── Page header ──────────────────────────────── */
    .page-header { margin-bottom:20px; }
    .page-header h1 { font-size:1.3rem;font-weight:700;margin:0 0 4px;color:#222; }
    .page-header p { font-size:.85rem;color:#888;margin:0; }

    /* ── Toolbar ──────────────────────────────────── */
    .toolbar {
      background:#fff;border-radius:14px;padding:14px 20px;margin-bottom:20px;
      display:flex;gap:10px;align-items:center;flex-wrap:wrap;
      box-shadow:0 2px 8px rgba(0,0,0,.06);
    }
    .toolbar-search { flex:1;min-width:160px;border:1px solid #dde1e7;border-radius:8px;padding:8px 12px;font-size:.85rem;outline:none; }
    .toolbar-search:focus { border-color:var(--ji-green);box-shadow:0 0 0 2px rgba(37,211,102,.15); }
    .filter-sel { border:1px solid #dde1e7;border-radius:8px;padding:8px 12px;font-size:.82rem;outline:none;background:#fff;cursor:pointer; }
    .btn-export { background:var(--ji-dark);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:.8rem;font-weight:600;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:6px; }
    .btn-export:hover { background:#2c2c54; }

    /* ── Candidate cards ──────────────────────────── */
    .candidate-card {
      border:1px solid #eef0f4;border-radius:12px;padding:16px;margin-bottom:12px;
      background:#fff;transition:box-shadow .15s;
    }
    .candidate-card:hover { box-shadow:0 4px 16px rgba(0,0,0,.08); }
    .cand-top { display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:10px; }
    .cand-avatar { width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-weight:700;font-size:1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0; }
    .cand-name { font-weight:700;font-size:.95rem;margin-bottom:2px; }
    .cand-meta { font-size:.78rem;color:#666;line-height:1.6; }
    .cand-actions { display:flex;gap:8px;flex-wrap:wrap;align-items:center; }
    .btn-wa { background:#25d366;color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:.78rem;font-weight:600;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:4px; }
    .btn-wa:hover { background:#1ebe5d;color:#fff; }
    .btn-cv { background:#f8f9fa;color:var(--ji-dark);border:1px solid #dde1e7;border-radius:8px;padding:6px 12px;font-size:.78rem;font-weight:600;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:4px; }
    .btn-cv:hover { background:#eef0f4;color:var(--ji-dark); }
    .btn-cv.disabled { opacity:.4;cursor:not-allowed;pointer-events:none; }
    .btn-shortlist { background:#1a5276;color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:.78rem;font-weight:600;cursor:pointer; }
    .btn-shortlist:hover { background:#154360; }
    .btn-reject-app { background:#e74c3c;color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:.78rem;font-weight:600;cursor:pointer; }
    .btn-reject-app:hover { background:#c0392b; }
    .btn-reset-app { background:#7f8c8d;color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:.78rem;font-weight:600;cursor:pointer; }
    .btn-reset-app:hover { background:#626567; }
    .skills-wrap { margin-top:8px;display:flex;flex-wrap:wrap;gap:6px; }
    .skill-tag { background:#f0f2f5;color:#444;border-radius:20px;padding:2px 10px;font-size:.72rem;font-weight:500; }

    /* ── Badges ───────────────────────────────────── */
    .badge-appr { background:#d5f5e3;color:#1e8449;padding:3px 10px;border-radius:12px;font-size:.75rem;font-weight:600; }
    .badge-pend { background:#fef9e7;color:#b7770d;padding:3px 10px;border-radius:12px;font-size:.75rem;font-weight:600; }
    .badge-reje { background:#fadbd8;color:#922b21;padding:3px 10px;border-radius:12px;font-size:.75rem;font-weight:600; }
    .badge-shrt { background:#d6eaf8;color:#1a5276;padding:3px 10px;border-radius:12px;font-size:.75rem;font-weight:600; }
    .badge-appl { background:#eaf4fb;color:#2471a3;padding:3px 10px;border-radius:12px;font-size:.75rem;font-weight:600; }

    /* ── Spinner / empty ──────────────────────────── */
    .spinner-wrap { padding:40px;text-align:center; }
    .empty-state { padding:46px;text-align:center;color:#aaa; }
    .empty-state i { font-size:2.5rem;display:block;margin-bottom:10px; }

    /* ── Responsive ───────────────────────────────── */
    @media(max-width:768px) {
      .toolbar { flex-direction:column; align-items:stretch; }
    }
    @media(max-width:640px) {
      .cand-top { flex-direction:column; }
    }
  </style>
</head>
<body>

<!-- ════════════════════ TOP BAR ════════════════════ -->
<div class="top-bar">
  <div>
    <a href="recruiter-dashboard.html" class="brand" style="text-decoration: none; color: inherit;"><span>Job</span>info – Applications</a>
  </div>
  <div style="display:flex;gap:10px;align-items:center;">
    <a href="recruiter-dashboard.html" class="btn-back"><i class="bi bi-arrow-left"></i> Dashboard</a>
    <button class="btn-logout" id="logout-btn"><i class="bi bi-box-arrow-right me-1"></i>Logout</button>
  </div>
</div>

<!-- ════════════════════ MAIN CONTENT ════════════════════ -->
<div class="container py-4">

  <!-- Page header -->
  <div class="page-header">
    <h1 id="page-title">Applications</h1>
    <p id="page-subtitle">Loading…</p>
  </div>

  <!-- Toolbar: search + filter + export -->
  <div class="toolbar">
    <input type="text" class="toolbar-search" id="app-search" placeholder="🔍  Search name or skill…">
    <select class="filter-sel" id="app-jobcode-filter" style="display:none;">
      <option value="all">All Job Codes</option>
    </select>
    <select class="filter-sel" id="app-status-filter">
      <option value="all">All Applicants</option>
      <option value="applied">📩 Applied</option>
      <option value="shortlisted">⭐ Shortlisted</option>
      <option value="rejected">❌ Rejected</option>
    </select>
    <button class="btn-export" id="export-csv-btn">
      <i class="bi bi-download"></i> Export CSV
    </button>
  </div>

  <!-- Applications list -->
  <div class="spinner-wrap" id="apps-loading">
    <div class="spinner-border text-success"></div>
    <p class="mt-3 text-muted small">Loading applications…</p>
  </div>
  <div id="apps-list"></div>
  <div class="empty-state" id="apps-empty" style="display:none">
    <i class="bi bi-people"></i>
    No applicants match this filter.
  </div>

</div>

<!-- Scripts -->
<script src="assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/config.js"></script>
<script>
/* ══════════════════════════════════════════════════════
   JobInfo – Applications Page (standalone)
   ══════════════════════════════════════════════════════ */

let verifiedWa = null, sessionToken = null;
let panelVacancyId = null, panelJobCode = null;
let allApps = [], currentAppFilter = "all", appSearch = "";

/* ══════════════════ SESSION GUARD ══════════════════ */
(function() {
  let t = sessionStorage.getItem("ji_r_token");
  let w = sessionStorage.getItem("ji_r_wa");

  // Fall back to the vacancy-form OTP session
  if (!t || !w) {
    t = sessionStorage.getItem("ji_token");
    w = sessionStorage.getItem("ji_wa");
    if (t && w) {
      sessionStorage.setItem("ji_r_token", t);
      sessionStorage.setItem("ji_r_wa", w);
    }
  }

  if (t && w) {
    sessionToken = t; verifiedWa = w;
    initPage();
  } else {
    // Not authenticated — redirect to dashboard login
    window.location.href = "recruiter-dashboard.html";
  }
})();

/* ══════════════════ LOGOUT ══════════════════ */
document.getElementById("logout-btn").addEventListener("click", () => {
  sessionStorage.removeItem("ji_r_token");
  sessionStorage.removeItem("ji_r_wa");
  sessionStorage.removeItem("ji_token");
  sessionStorage.removeItem("ji_wa");
  window.location.href = "recruiter.html";
});

/* ══════════════════ PAGE INIT ══════════════════ */
function initPage() {
  const params = new URLSearchParams(window.location.search);

  const vacancyId = params.get("vacancy_id");
  const filter    = params.get("filter");       // __apps or __shortlisted
  const jobCode   = params.get("job_code") || "";
  const title     = params.get("title") || "";
  const count     = parseInt(params.get("count") || "0");

  if (vacancyId) {
    // Single-vacancy mode
    panelVacancyId = parseInt(vacancyId);
    panelJobCode = jobCode;
    document.getElementById("page-title").textContent = title || "Applications";
    document.getElementById("page-subtitle").textContent =
      jobCode ? `${jobCode} · ${count} application${count !== 1 ? "s" : ""}` : "Loading…";
    loadVacancyApps(panelVacancyId);
  } else if (filter === "__apps" || filter === "__shortlisted") {
    // Global mode
    panelVacancyId = "global";
    panelJobCode = null;
    const defaultStatus = filter === "__shortlisted" ? "shortlisted" : "all";
    currentAppFilter = defaultStatus;
    document.getElementById("app-status-filter").value = defaultStatus;
    document.getElementById("page-title").textContent = "All Applications";
    document.getElementById("page-subtitle").textContent = "Applications across all vacancies";
    loadGlobalApps();
  } else {
    // Fallback: load all
    panelVacancyId = "global";
    panelJobCode = null;
    document.getElementById("page-title").textContent = "All Applications";
    document.getElementById("page-subtitle").textContent = "Applications across all vacancies";
    loadGlobalApps();
  }
}

/* ══════════════════ DATA LOADING ══════════════════ */

async function loadVacancyApps(vacId) {
  showLoading();
  try {
    const r = await post("/api/recruiters/vacancy-applications", {
      wa_number: verifiedWa, session_token: sessionToken, vacancy_id: vacId
    });
    if (r.status === 401) { alert("Session expired."); window.location.href = "recruiter-dashboard.html"; return; }
    if (!r.ok) throw new Error(await r.text());
    const d = await r.json();
    allApps = d.applications;
  } catch(e) {
    console.error(e);
    allApps = [];
    document.getElementById("apps-list").innerHTML =
      '<div class="empty-state"><i class="bi bi-exclamation-triangle text-danger"></i><p>Could not load applications.</p></div>';
  } finally { hideLoading(); }
  renderApps();
}

async function loadGlobalApps() {
  showLoading();
  const jcFilter = document.getElementById("app-jobcode-filter");
  if (jcFilter) {
    jcFilter.style.display = "inline-block";
    jcFilter.innerHTML = '<option value="all">All Job Codes</option>';
  }
  try {
    const r = await post("/api/recruiters/all-applications", {
      wa_number: verifiedWa, session_token: sessionToken
    });
    if (r.status === 401) { alert("Session expired."); window.location.href = "recruiter-dashboard.html"; return; }
    if (!r.ok) throw new Error(await r.text());
    const d = await r.json();
    allApps = d.applications;

    if (jcFilter) {
      const uniqueCodes = [...new Set(allApps.map(a => a.job_code))].filter(Boolean);
      uniqueCodes.forEach(code => {
        jcFilter.insertAdjacentHTML("beforeend", `<option value="${esc(code)}">${esc(code)}</option>`);
      });
    }
  } catch(e) {
    console.error(e);
    allApps = [];
    document.getElementById("apps-list").innerHTML =
      '<div class="empty-state"><i class="bi bi-exclamation-triangle text-danger"></i><p>Could not load applications.</p></div>';
  } finally { hideLoading(); }
  renderApps();
}

/* ══════════════════ RENDER ══════════════════ */

function renderApps() {
  const list = document.getElementById("apps-list");
  const empty = document.getElementById("apps-empty");
  const jcFilterEl = document.getElementById("app-jobcode-filter");
  const jobCodeFilter = jcFilterEl ? jcFilterEl.value : "all";

  let rows = allApps;
  if (currentAppFilter !== "all") rows = rows.filter(a => a.status === currentAppFilter);
  if (jobCodeFilter !== "all") rows = rows.filter(a => a.job_code === jobCodeFilter);

  if (appSearch) {
    const q = appSearch.toLowerCase();
    rows = rows.filter(a =>
      a.candidate.name.toLowerCase().includes(q) ||
      (a.candidate.skills || "").toLowerCase().includes(q) ||
      (a.candidate.location || "").toLowerCase().includes(q)
    );
  }
  list.innerHTML = "";
  if (!rows.length) { empty.style.display = "block"; return; }
  empty.style.display = "none";

  rows.forEach((app, idx) => {
    const c = app.candidate;
    const statusMap = {
      applied:     ["badge-appl", "📩 Applied"],
      shortlisted: ["badge-shrt", "⭐ Shortlisted"],
      rejected:    ["badge-reje", "❌ Rejected"],
    };
    const [sc, sl] = statusMap[app.status] || ["badge-appl", app.status];
    const waLink = `https://wa.me/${c.wa_number}?text=Hi%20${encodeURIComponent(c.name)}%2C%20regarding%20your%20application%20on%20JobInfo.`;
    const initials = c.name.split(" ").map(w=>w[0]).slice(0,2).join("").toUpperCase();
    const skillTags = (c.skills || "").split(/[,;]/).filter(s=>s.trim()).map(s =>
      `<span class="skill-tag">${esc(s.trim())}</span>`
    ).join("");
    const applied = app.applied_at ? new Date(app.applied_at).toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"numeric"}) : "—";

    list.insertAdjacentHTML("beforeend", `
      <div class="candidate-card" id="ccard-${app.application_id}">
        <div class="cand-top">
          <div style="display:flex;gap:12px;align-items:flex-start">
            <div class="cand-avatar" style="background:${avatarColor(idx)}">${initials}</div>
            <div>
              <div class="cand-name">${esc(c.name)}</div>
              <div class="cand-meta">
                ${c.location ? "📍 " + esc(c.location) + "<br>" : ""}
                <i class="bi bi-gender-ambiguous"></i> ${c.gender ? esc(c.gender.charAt(0).toUpperCase() + c.gender.slice(1)) : 'Not specified'} ·
                ${c.age ? "🎂 Age " + c.age + "<br>" : ""}
                📅 Applied ${applied}
              </div>
            </div>
          </div>
          <span class="${sc}" style="white-space:nowrap">${sl}</span>
        </div>

        ${skillTags ? `<div class="skills-wrap">${skillTags}</div>` : ""}

        <div class="cand-actions mt-3">
          <a href="${waLink}" target="_blank" class="btn-wa">
            <i class="bi bi-whatsapp"></i> Contact
          </a>
          ${c.has_cv
            ? `<a href="${JOBINFO_CONFIG.API_URL}/files/cv/${encodeURIComponent(c.cv_path)}?candidate_name=${encodeURIComponent(c.name)}&job_code=${encodeURIComponent(panelJobCode || '')}" target="_blank" class="btn-cv">
                <i class="bi bi-file-earmark-person"></i> Download CV
               </a>`
            : `<span class="btn-cv disabled"><i class="bi bi-file-earmark-x"></i> No CV</span>`}
          ${app.status !== "shortlisted"
            ? `<button class="btn-shortlist" onclick="updateStatus(${app.application_id},'shortlisted')"><i class="bi bi-star me-1"></i>Shortlist</button>`
            : ""}
          ${app.status !== "rejected"
            ? `<button class="btn-reject-app" onclick="updateStatus(${app.application_id},'rejected')"><i class="bi bi-x me-1"></i>Reject</button>`
            : ""}
          ${app.status !== "applied"
            ? `<button class="btn-reset-app" onclick="updateStatus(${app.application_id},'applied')"><i class="bi bi-arrow-counterclockwise me-1"></i>Reset</button>`
            : ""}
        </div>
      </div>
    `);
  });
}

/* ══════════════════ STATUS UPDATE ══════════════════ */

async function updateStatus(appId, newStatus) {
  try {
    const r = await post("/api/recruiters/application/update-status", {
      wa_number: verifiedWa, session_token: sessionToken,
      application_id: appId, status: newStatus
    });
    if (!r.ok) throw new Error();
    const app = allApps.find(a => a.application_id === appId);
    if (app) app.status = newStatus;
    renderApps();
  } catch { alert("Failed to update status. Please try again."); }
}

/* ══════════════════ SEARCH & FILTER ══════════════════ */

document.getElementById("app-search").addEventListener("input", e => {
  appSearch = e.target.value.trim();
  renderApps();
});
document.getElementById("app-status-filter").addEventListener("change", e => {
  currentAppFilter = e.target.value;
  renderApps();
});
document.getElementById("app-jobcode-filter").addEventListener("change", () => {
  renderApps();
});

/* ══════════════════ CSV EXPORT ══════════════════ */

document.getElementById("export-csv-btn").addEventListener("click", async () => {
  if (!panelVacancyId) return;

  const btn = document.getElementById("export-csv-btn");
  btn.disabled = true; btn.innerHTML = '<i class="bi bi-hourglass-split"></i> Generating…';

  let apiEndpoint = "";
  let requestBody = { wa_number: verifiedWa, session_token: sessionToken };

  if (panelVacancyId === "global") {
    apiEndpoint = "/api/recruiters/all-applications/export-csv";
  } else {
    apiEndpoint = "/api/recruiters/vacancy-applications/export-csv";
    requestBody.vacancy_id = panelVacancyId;
  }

  try {
    const r = await post(apiEndpoint, requestBody);
    if (!r.ok) throw new Error();
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    const cd = r.headers.get("Content-Disposition") || "";
    const fn = cd.match(/filename="([^"]+)"/)?.[1] || "applications.csv";
    a.download = fn; a.click(); URL.revokeObjectURL(url);
  } catch { alert("Could not export CSV. Please try again."); }
  finally { btn.disabled = false; btn.innerHTML = '<i class="bi bi-download"></i> Export CSV'; }
});

/* ══════════════════ HELPERS ══════════════════ */

function post(path, body) {
  return fetch(JOBINFO_CONFIG.API_URL + path, {
    method: "POST", headers: {"Content-Type": "application/json"},
    body: JSON.stringify(body)
  });
}
function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function showLoading() { document.getElementById("apps-loading").style.display = "block"; }
function hideLoading() { document.getElementById("apps-loading").style.display = "none"; }
const AVATAR_COLORS = ["#667eea","#f093fb","#4facfe","#43e97b","#fa709a","#a18cd1","#fccb90","#e0c3fc"];
function avatarColor(i) { return AVATAR_COLORS[i % AVATAR_COLORS.length]; }
</script>
</body>
</html>
