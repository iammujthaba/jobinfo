<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Applications – JobInfo Recruiter</title>
  <meta name="description" content="View and manage job applications on JobInfo.">
  <meta name="robots" content="noindex, nofollow">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Raleway:wght@500;600;700&display=swap" rel="stylesheet">
  <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/css/main.css" rel="stylesheet">

  <style>
    :root { --ji-green:#25d366; --ji-dark:#1a1a2e; --ji-bg:#f4f6fb; }
    *, *::before, *::after { box-sizing:border-box; }
    body { background:var(--ji-bg); font-family:Roboto,sans-serif; margin:0; overflow-x:hidden; }

    /* ── Sticky Page Header ──────────────────────── */
    .sticky-header {
      position:sticky; top:0; z-index:10;
      background:#fff; border-bottom:1px solid #eef0f4; padding:16px;
    }

    /* Row 1 — Title */
    .header-title-row {
      display:flex; align-items:flex-start; justify-content:space-between;
      gap:10px; margin-bottom:12px;
    }
    .header-left { display:flex; flex-direction:column; gap:3px; }
    .header-job-title { font-size:1.1rem; font-weight:700; color:#222; }
    .header-job-code { font-size:.78rem; color:#888; display:flex; align-items:center; gap:6px; }
    .jc-pill {
      background:#e8f5e9; color:#1e8449; border-radius:6px; padding:1px 8px;
      font-size:.78rem; font-weight:700; display:inline-block;
    }
    .header-right { display:flex; gap:8px; align-items:center; flex-shrink:0; }
    .count-chip {
      background:#f4f6fb; border:1px solid #dde1e7; border-radius:8px;
      padding:6px 12px; font-size:.82rem; color:#666;
    }
    .count-chip strong { color:#222; }
    .btn-csv {
      background:var(--ji-dark); color:#fff; border:none; border-radius:8px;
      padding:7px 14px; font-size:.8rem; font-weight:600; cursor:pointer;
      display:inline-flex; align-items:center; gap:6px; font-family:inherit;
      transition:background .2s;
    }
    .btn-csv:hover { background:#2c2c54; }
    .btn-csv:disabled { opacity:.6; cursor:not-allowed; }

    /* Row 2 — Search */
    .search-wrap {
      position:relative; width:100%; margin-bottom:12px;
    }
    .search-input {
      width:100%; border:1px solid #dde1e7; border-radius:10px;
      padding:9px 42px 9px 14px; font-size:.85rem; outline:none;
      font-family:inherit; background:#fff; box-sizing:border-box;
    }
    .search-input:focus { border-color:var(--ji-green); box-shadow:0 0 0 2px rgba(37,211,102,.15); }
    .search-filter-btn {
      position:absolute; right:12px; top:50%; transform:translateY(-50%);
      background:none; border:none; color:#888; cursor:pointer; font-size:1.1rem;
      padding:0; display:flex; align-items:center; line-height:1;
    }

    /* Row 3 — Status Tabs */
    .status-tabs { display:flex; gap:6px; flex-wrap:wrap; }
    .tab-pill {
      background:#fff; border:1px solid #dde1e7; border-radius:20px;
      padding:6px 14px; font-size:.82rem; color:#888; cursor:pointer;
      font-family:inherit; transition:all .15s; white-space:nowrap;
    }
    .tab-pill:hover { border-color:#bbb; }
    .tab-pill.active {
      background:var(--ji-dark); color:#fff; border-color:var(--ji-dark);
      font-weight:600;
    }

    /* ── Applicant Cards List ────────────────────── */
    .cards-container { padding:14px 12px 0; display:flex; flex-direction:column; gap:12px; }

    .app-card {
      background:#fff; border-radius:14px; border:1px solid #eef0f4;
      overflow:hidden; transition:box-shadow .15s; position:relative;
    }
    .app-card:hover { box-shadow:0 4px 16px rgba(0,0,0,.07); }
    .app-card.shortlisted {
      border-left:3px solid var(--ji-green); border-color:#9fe1cb;
    }

    /* Zone A — Card Header */
    .card-header-zone {
      padding:13px 52px 13px 13px; display:flex; align-items:flex-start;
      gap:11px; position:relative;
    }
    .heart-btn {
      position:absolute; top:13px; right:13px; width:34px; height:34px;
      border-radius:50%; display:flex; align-items:center; justify-content:center;
      font-size:16px; cursor:pointer; transition:all .2s; border:1px solid;
      line-height:1; padding:0; font-family:inherit;
    }
    .heart-btn.inactive {
      background:#f5f5f5; border-color:#dde1e7; color:#aaa;
    }
    .heart-btn.active {
      background:#fadbd8; border-color:#f1948a; color:#e74c3c;
    }
    .heart-btn:hover { transform:scale(1.1); }
    .card-avatar {
      width:48px; height:48px; border-radius:50%; color:#fff;
      font-size:16px; font-weight:700; display:flex; align-items:center;
      justify-content:center; flex-shrink:0;
    }
    .card-name { font-size:15px; font-weight:700; color:#222; }
    .card-date { font-size:11px; color:#888; }
    .card-date .date-val { color:#1e8449; font-weight:600; }

    /* Zone B — Divider */
    .card-divider { border:none; border-top:1px solid #eef0f4; margin:0; }

    /* Zone C — Info Grid */
    .card-info-grid {
      padding:12px 13px;
      display:grid; grid-template-columns:minmax(0,1fr) minmax(0,1fr); gap:12px 10px;
    }
    .info-label {
      font-size:9.5px; text-transform:uppercase; letter-spacing:.05em;
      color:#888; font-weight:600; display:block; margin-bottom:3px;
    }
    .info-value { font-size:13px; color:#333; }
    .job-area-pill {
      background:#eeedfe; color:#3c3489; border:1px solid #afa9ec;
      border-radius:20px; padding:3px 10px; font-size:11px;
      display:inline-flex; align-items:center; gap:4px;
      max-width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    }

    /* Zone D — Card Footer */
    .card-footer-zone {
      padding:9px 13px; border-top:1px solid #eef0f4;
      display:flex; justify-content:space-between; align-items:center;
      gap:8px; flex-wrap:nowrap;
    }
    .btn-view-cv {
      background:#eaf4fb; color:#2471a3; border:1px solid #aed6f1;
      border-radius:8px; padding:8px 13px; font-size:12px; font-weight:600;
      line-height:1.2; cursor:pointer; text-decoration:none;
      display:inline-flex; align-items:center; gap:5px; font-family:inherit;
      flex-shrink:1; min-width:0; white-space:nowrap; overflow:hidden;
      text-overflow:ellipsis; max-width:120px;
    }
    .btn-view-cv:hover { background:#d4eaf7; color:#1a5276; }
    .btn-no-cv {
      background:#f5f5f5; color:#aaa; border:1px solid #dde1e7;
      border-radius:8px; padding:8px 13px; font-size:12px; font-weight:600;
      line-height:1.2; opacity:.6; cursor:not-allowed; pointer-events:none;
      display:inline-flex; align-items:center; gap:5px;
      flex-shrink:1; min-width:0; white-space:nowrap; overflow:hidden;
      text-overflow:ellipsis; max-width:120px;
    }
    .contact-buttons {
      display:flex; gap:7px; align-items:center;
      flex-shrink:0; flex-wrap:nowrap;
    }
    .btn-contact {
      background:#f8f9fa; color:var(--ji-dark); border:1px solid #dde1e7;
      border-radius:8px; padding:8px 13px; font-size:12px; font-weight:600;
      line-height:1.2; cursor:pointer; text-decoration:none;
      display:inline-flex; align-items:center; gap:5px;
      flex-shrink:0; white-space:nowrap;
    }
    .btn-contact:hover { background:#eef0f4; color:var(--ji-dark); }
    .btn-whatsapp {
      background:var(--ji-green); color:#fff; border:none; border-radius:8px;
      padding:8px 13px; font-size:12px; font-weight:600; line-height:1.2;
      cursor:pointer; text-decoration:none;
      display:inline-flex; align-items:center; gap:5px;
      flex-shrink:0; white-space:nowrap;
    }
    .btn-whatsapp:hover { background:#1ebe5d; color:#fff; }
    .btn-whatsapp i { font-size:.9rem; margin-right:4px; }

    /* ── Loading / Empty / Error States ──────────── */
    .spinner-wrap { padding:40px; text-align:center; }
    .empty-state { padding:46px; text-align:center; color:#aaa; }
    .empty-state i { font-size:2.5rem; display:block; margin-bottom:10px; }

    /* ── Responsive ──────────────────────────────── */

    @media (max-width:480px) {
      .cards-container { padding:12px 10px 0; }
      .card-header-zone { padding:12px 48px 12px 12px; }
      .card-info-grid { padding:12px; gap:10px 8px; }
      .card-footer-zone { padding:9px 12px; }
      .job-area-pill { font-size:10.5px; padding:3px 8px; }
    }
  </style>
</head>
<body>



<!-- ════════════════════ SECTION 2 — STICKY PAGE HEADER ════════════════════ -->
<div class="sticky-header" id="sticky-header">

  <!-- Row 1 — Title row -->
  <div class="header-title-row">
    <div class="header-left">
      <div class="header-job-title" id="header-job-title">Applications</div>
      <div class="header-job-code" id="header-job-code"></div>
    </div>
    <div class="header-right">
      <div class="count-chip" id="count-chip"><strong>0</strong> applicants</div>
      <button class="btn-csv" id="export-csv-btn">
        <i class="bi bi-download"></i> CSV
      </button>
    </div>
  </div>

  <!-- Row 2 — Search bar -->
  <div class="search-wrap">
    <input type="text" class="search-input" id="app-search" placeholder="Search by name, location, job area…">
    <button class="search-filter-btn" title="Filters (coming soon)"><i class="bi bi-sliders"></i></button>
  </div>

  <!-- Row 3 — Status tabs -->
  <div class="status-tabs" id="status-tabs">
    <button class="tab-pill active" data-filter="all" id="tab-all">All (0)</button>
    <button class="tab-pill" data-filter="applied" id="tab-applied">Applied (0)</button>
    <button class="tab-pill" data-filter="shortlisted" id="tab-shortlisted">Shortlisted (0)</button>
  </div>

</div>

<!-- ════════════════════ SECTION 3 — APPLICANT CARDS LIST ════════════════════ -->

<!-- Loading state -->
<div class="spinner-wrap" id="apps-loading">
  <div class="spinner-border text-success"></div>
  <p class="mt-3 text-muted small">Loading applications…</p>
</div>

<!-- Cards container -->
<div class="cards-container" id="apps-list"></div>

<!-- Empty state -->
<div class="empty-state" id="apps-empty" style="display:none">
  <i class="bi bi-people"></i>
  No applicants match this filter.
</div>

<!-- Error state (injected dynamically) -->

<!-- Scripts -->
<script src="assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/config.js"></script>
<script>
/* ══════════════════════════════════════════════════════
   JobInfo – Applications Page (rebuilt)
   ══════════════════════════════════════════════════════ */

/* ── State Management ──────────────────────────────── */
let verifiedWa    = null;
let sessionToken  = null;
let panelVacancyId = null;   // int or "global"
let panelJobCode  = null;
let allApps       = [];
let currentFilter = "all";   // "all" | "applied" | "shortlisted"
let searchQuery   = "";

/* ── Session Guard ─────────────────────────────────── */
(function() {
  let t = sessionStorage.getItem("ji_r_token");
  let w = sessionStorage.getItem("ji_r_wa");

  // Fallback to vacancy-form OTP session
  if (!t || !w) {
    t = sessionStorage.getItem("ji_token");
    w = sessionStorage.getItem("ji_wa");
    if (t && w) {
      sessionStorage.setItem("ji_r_token", t);
      sessionStorage.setItem("ji_r_wa", w);
    }
  }

  if (t && w) {
    sessionToken = t;
    verifiedWa = w;
    initPage();
  } else {
    window.location.href = "recruiter-dashboard.html";
  }
})();

/* ── Logout (no-op — top bar removed) ─────────────── */

/* ── Page Init ─────────────────────────────────────── */
function initPage() {
  const params = new URLSearchParams(window.location.search);

  const vacancyId = params.get("vacancy_id");
  const filter    = params.get("filter");
  const jobCode   = params.get("job_code") || "";
  const title     = params.get("title") || "";
  const count     = parseInt(params.get("count") || "0");

  if (vacancyId) {
    // Single-vacancy mode
    panelVacancyId = parseInt(vacancyId);
    panelJobCode = jobCode;
    document.getElementById("header-job-title").textContent = title || "Applications";
    if (jobCode) {
      document.getElementById("header-job-code").innerHTML =
        `Job code <span class="jc-pill">${esc(jobCode)}</span>`;
    }
    document.getElementById("count-chip").innerHTML = `<strong>${count}</strong> applicant${count !== 1 ? "s" : ""}`;
    loadVacancyApps(panelVacancyId);
  } else if (filter === "__apps" || filter === "__shortlisted") {
    // Global mode
    panelVacancyId = "global";
    panelJobCode = null;
    const defaultStatus = filter === "__shortlisted" ? "shortlisted" : "all";
    currentFilter = defaultStatus;
    document.getElementById("header-job-title").textContent = "All Applications";
    document.getElementById("header-job-code").innerHTML =
      `Job code <span class="jc-pill">All vacancies</span>`;
    setActiveTab(defaultStatus);
    loadGlobalApps();
  } else {
    // Fallback: load all
    panelVacancyId = "global";
    panelJobCode = null;
    document.getElementById("header-job-title").textContent = "All Applications";
    document.getElementById("header-job-code").innerHTML =
      `Job code <span class="jc-pill">All vacancies</span>`;
    loadGlobalApps();
  }
}

/* ── Data Loading ──────────────────────────────────── */

async function loadVacancyApps(vacId) {
  showLoading();
  try {
    const r = await post("/api/recruiters/vacancy-applications", {
      wa_number: verifiedWa, session_token: sessionToken, vacancy_id: vacId
    });
    if (r.status === 401) { alert("Session expired."); window.location.href = "recruiter-dashboard.html"; return; }
    if (!r.ok) throw new Error(await r.text());
    const d = await r.json();
    allApps = d.applications;
  } catch(e) {
    console.error(e);
    allApps = [];
    document.getElementById("apps-list").innerHTML =
      '<div class="empty-state"><i class="bi bi-exclamation-triangle text-danger"></i><p>Could not load applications.</p></div>';
  } finally { hideLoading(); }
  renderApps();
}

async function loadGlobalApps() {
  showLoading();
  try {
    const r = await post("/api/recruiters/all-applications", {
      wa_number: verifiedWa, session_token: sessionToken
    });
    if (r.status === 401) { alert("Session expired."); window.location.href = "recruiter-dashboard.html"; return; }
    if (!r.ok) throw new Error(await r.text());
    const d = await r.json();
    allApps = d.applications;
  } catch(e) {
    console.error(e);
    allApps = [];
    document.getElementById("apps-list").innerHTML =
      '<div class="empty-state"><i class="bi bi-exclamation-triangle text-danger"></i><p>Could not load applications.</p></div>';
  } finally { hideLoading(); }
  renderApps();
}

/* ── Render ─────────────────────────────────────────── */

function renderApps() {
  const list  = document.getElementById("apps-list");
  const empty = document.getElementById("apps-empty");

  // Update tab counts (always reflect full allApps)
  const totalCount       = allApps.length;
  const appliedCount     = allApps.filter(a => a.status === "applied").length;
  const shortlistedCount = allApps.filter(a => a.status === "shortlisted").length;

  document.getElementById("tab-all").textContent        = `All (${totalCount})`;
  document.getElementById("tab-applied").textContent     = `Applied (${appliedCount})`;
  document.getElementById("tab-shortlisted").textContent = `Shortlisted (${shortlistedCount})`;

  // Update count chip in header
  document.getElementById("count-chip").innerHTML = `<strong>${totalCount}</strong> applicant${totalCount !== 1 ? "s" : ""}`;

  // Apply filters
  let rows = allApps;
  if (currentFilter !== "all") rows = rows.filter(a => a.status === currentFilter);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    rows = rows.filter(a => {
      const c = a.candidate;
      return (c.name || "").toLowerCase().includes(q)
        || (c.exact_location || "").toLowerCase().includes(q)
        || (c.district || "").toLowerCase().includes(q)
        || (c.category || "").toLowerCase().includes(q)
        || (c.sub_category || "").toLowerCase().includes(q);
    });
  }

  list.innerHTML = "";
  if (!rows.length) { empty.style.display = "block"; return; }
  empty.style.display = "none";

  rows.forEach((app, idx) => {
    const c = app.candidate;
    const isShortlisted = app.status === "shortlisted";
    const initials = c.name.split(" ").map(w => w[0]).slice(0, 2).join("").toUpperCase();
    const appliedDate = formatDate(app.applied_at);
    const location = [c.exact_location, c.district].filter(Boolean).join(", ") || "—";
    const jobArea = c.category
      ? `<span class="job-area-pill">${esc(c.category)}</span>`
      : '<span style="color:#aaa">—</span>';

    const heartClass = isShortlisted ? "active" : "inactive";
    const heartChar  = isShortlisted ? "♥" : "♡";
    const newStatus  = isShortlisted ? "applied" : "shortlisted";
    const cardClass  = isShortlisted ? "app-card shortlisted" : "app-card";

    const cvBtn = c.has_cv
      ? `<a href="${JOBINFO_CONFIG.API_URL}/files/cv/${encodeURIComponent(c.cv_path)}?candidate_name=${encodeURIComponent(c.name)}&job_code=${encodeURIComponent(panelJobCode || '')}" target="_blank" class="btn-view-cv">📄 View CV</a>`
      : `<span class="btn-no-cv">📂 No CV</span>`;

    const waLink = `https://wa.me/${c.wa_number}?text=Hi%20${encodeURIComponent(c.name)}%2C%20regarding%20your%20application%20on%20JobInfo.`;

    list.insertAdjacentHTML("beforeend", `
      <div class="${cardClass}" id="ccard-${app.application_id}">

        <!-- Zone A — Card Header -->
        <div class="card-header-zone">
          <button class="heart-btn ${heartClass}" onclick="updateStatus(${app.application_id},'${newStatus}')"
                  title="${isShortlisted ? 'Remove from shortlist' : 'Shortlist'}">${heartChar}</button>
          <div class="card-avatar" style="background:${avatarColor(idx)}">${initials}</div>
          <div>
            <div class="card-name">${esc(c.name)}</div>
            <div class="card-date">Applied <span class="date-val">${appliedDate}</span></div>
          </div>
        </div>

        <!-- Zone B — Divider -->
        <hr class="card-divider">

        <!-- Zone C — Info Grid -->
        <div class="card-info-grid">
          <div>
            <span class="info-label">AGE</span>
            <div class="info-value">${c.age != null ? c.age + " years old" : "—"}</div>
          </div>
          <div>
            <span class="info-label">GENDER</span>
            <div class="info-value">${c.gender ? esc(c.gender) : "—"}</div>
          </div>
          <div>
            <span class="info-label">APPLICANT LOCATION</span>
            <div class="info-value">${esc(location)}</div>
          </div>
          <div>
            <span class="info-label">INTERESTED JOB AREA</span>
            <div class="info-value">${jobArea}</div>
          </div>
        </div>

        <!-- Zone D — Card Footer -->
        <div class="card-footer-zone">
          ${cvBtn}
          <div class="contact-buttons">
            <a href="tel:+${c.wa_number}" class="btn-contact">📞 Contact</a>
            <a href="${waLink}" target="_blank" class="btn-whatsapp"><i class="bi bi-whatsapp"></i>WhatsApp</a>
          </div>
        </div>

      </div>
    `);
  });
}

/* ── Status Update ─────────────────────────────────── */

async function updateStatus(appId, newStatus) {
  try {
    const r = await post("/api/recruiters/application/update-status", {
      wa_number: verifiedWa, session_token: sessionToken,
      application_id: appId, status: newStatus
    });
    if (!r.ok) throw new Error();
    const app = allApps.find(a => a.application_id === appId);
    if (app) app.status = newStatus;
    renderApps();
  } catch { alert("Failed to update status. Please try again."); }
}

/* ── Search ────────────────────────────────────────── */

document.getElementById("app-search").addEventListener("input", e => {
  searchQuery = e.target.value.trim();
  renderApps();
});

/* ── Status Tabs ───────────────────────────────────── */

document.querySelectorAll(".tab-pill[data-filter]").forEach(tab => {
  tab.addEventListener("click", () => {
    currentFilter = tab.dataset.filter;
    setActiveTab(currentFilter);
    renderApps();
  });
});

function setActiveTab(filter) {
  document.querySelectorAll(".tab-pill[data-filter]").forEach(t => {
    t.classList.toggle("active", t.dataset.filter === filter);
  });
}

/* ── CSV Export ─────────────────────────────────────── */

document.getElementById("export-csv-btn").addEventListener("click", async () => {
  if (!panelVacancyId) return;

  const btn = document.getElementById("export-csv-btn");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1" role="status"></span> Generating…';

  let apiEndpoint = "";
  let requestBody = { wa_number: verifiedWa, session_token: sessionToken };

  if (panelVacancyId === "global") {
    apiEndpoint = "/api/recruiters/all-applications/export-csv";
  } else {
    apiEndpoint = "/api/recruiters/vacancy-applications/export-csv";
    requestBody.vacancy_id = panelVacancyId;
  }

  try {
    const r = await post(apiEndpoint, requestBody);
    if (!r.ok) throw new Error();
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    const cd = r.headers.get("Content-Disposition") || "";
    const fn = cd.match(/filename="([^"]+)"/)?.[1] || "applications.csv";
    a.download = fn;
    a.click();
    URL.revokeObjectURL(url);
  } catch { alert("Could not export CSV. Please try again."); }
  finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-download"></i> CSV';
  }
});

/* ── Utility Functions ─────────────────────────────── */

function post(path, body) {
  return fetch(JOBINFO_CONFIG.API_URL + path, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });
}

function esc(s) {
  return String(s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;")
    .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

const AVATAR_COLORS = ["#667eea","#f093fb","#4facfe","#43e97b","#fa709a","#a18cd1","#fccb90","#e0c3fc"];
function avatarColor(i) { return AVATAR_COLORS[i % AVATAR_COLORS.length]; }

function formatDate(isoString) {
  if (!isoString) return "—";
  const d = new Date(isoString);
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
}

function showLoading() { document.getElementById("apps-loading").style.display = "block"; }
function hideLoading() { document.getElementById("apps-loading").style.display = "none"; }
</script>
