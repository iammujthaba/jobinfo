<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Dashboard - Jobinfo</title>
  
  <link href="assets/img/favicon.png" rel="icon">
  <link href="assets/img/apple-touch-icon.png" rel="apple-touch-icon">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/css/main.css" rel="stylesheet">
  
  <style>
    :root { 
      --ji-green: #25d366; 
      --ji-dark: #1a1a2e; 
      --ji-card-bg: #fff; 
      --ji-card-border: #eaeaea;
      --ji-bg: #f4f6fb; 
      --ji-text-muted: #6c757d;
    }
    body { background:var(--ji-bg); font-family:Roboto,sans-serif; padding-bottom: 30px;}
    
    /* Top Bar */
    .top-bar { background:var(--ji-dark); color:#fff; padding:16px 20px; display:flex; align-items:center; justify-content:space-between; margin-bottom: 16px;}
    .top-bar-left { display:flex; flex-direction:column; }
    .top-bar .brand { font-size:1.15rem; font-weight:700; text-decoration:none; color:#fff; display: flex; align-items: center;}
    .top-bar .brand span { color:var(--ji-green); font-weight: 700; }
    .sub-label { font-size:0.8rem; color:#a1a1aa; margin-top: 2px;}
    .btn-logout { background:none; border:1px solid rgba(255,255,255,.2); color:#fff; border-radius:8px; padding:6px 14px; font-size:0.85rem; cursor:pointer; transition:all .2s; }
    .btn-logout:hover { background:rgba(255,255,255,.1); }

    /* Container */
    .container-mobile { max-width: 440px; margin: auto; padding: 0 14px; }


    /* Cards */
    .card-dark { background: var(--ji-card-bg); border-radius: 16px; padding: 20px; color: #333; margin-bottom: 16px; box-shadow: 0 4px 10px rgba(0,0,0,.05); border: 1px solid var(--ji-card-border); }
    
    /* Profile Overview */
    .profile-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; }
    .profile-info { display: flex; align-items: center; gap: 12px; }
    .avatar-circle { width: 56px; height: 56px; background: var(--ji-green); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; font-weight: 700; color: #fff; }
    .profile-name { font-size: 1.15rem; font-weight: 600; margin-bottom: 4px; }
    .profile-location { font-size: 0.8rem; color: #666; display: flex; align-items: center; gap: 4px; line-height: 1.3;}
    .btn-edit { background: none; border: 1px solid #ccc; color: #333; border-radius: 8px; padding: 6px 12px; font-size: 0.85rem; font-weight: 500; display: flex; align-items: center; gap: 6px; cursor: pointer; transition: background .2s;}
    .btn-edit:hover { background: #f4f6fb; }
    
    .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px 16px; margin-bottom: 16px; }
    .data-item-label { font-size: 0.65rem; color: #a1a1aa; text-transform: uppercase; margin-bottom: 4px; font-weight: 600; letter-spacing: 0.5px; }
    .data-item-value { font-size: 0.95rem; font-weight: 600; color: #333; }

    /* Profile Strength */
    .strength-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .strength-title { font-size: 1.05rem; font-weight: 600; }
    .strength-pct { color: var(--ji-green); font-weight: 600; font-size:1.05rem;}
    .strength-bar-bg { background: #e9ecef; height: 8px; border-radius: 4px; margin-bottom: 20px; overflow: hidden; }
    .strength-bar-fill { background: var(--ji-green); height: 100%; border-radius: 4px; }
    
    .checklist { list-style: none; padding: 0; margin: 0; }
    .checklist li { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; font-size: 0.85rem; color: #555; font-weight: 400;}
    .checklist li:last-child { margin-bottom: 0; }
    .check-icon { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; }
    .check-icon.done { background: #e0f2f1; color: var(--ji-green); }
    .check-icon.pending { background: #fee2e2; color: #ef4444; }

    /* CV Manager */
    .cv-item { background: #f8f9fa; border: 1px solid #eaeaea; border-radius: 8px; padding: 12px 14px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .cv-item:last-child { margin-bottom: 0; }
    .cv-info { display: flex; align-items: center; gap: 12px; }
    .cv-icon { font-size: 1.4rem; color: #ef4444; }
    .cv-name { font-size: 0.85rem; font-weight: 500; color: #333; margin-bottom: 0px; word-break: break-all;}
    .cv-meta { font-size: 0.7rem; color: #888; margin-top: 2px;}
    .btn-delete-cv { background: #fee2e2; color: #ef4444; border: none; width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s;}
    .btn-delete-cv:hover { background: #fca5a5; color: #fff;}
    .cv-upload-box { border: 2px dashed #ccc; border-radius: 8px; padding: 20px; text-align: center; cursor: pointer; transition: 0.2s; margin-top: 14px;}
    .cv-upload-box:hover { border-color: var(--ji-green); background: #f0fdf4; }
    .cv-upload-box i { font-size: 1.5rem; color: #888; margin-bottom: 8px; }
    .cv-upload-box div { font-size: 0.85rem; font-weight: 500; color: #555; }
    .cv-upload-box span { font-size: 0.75rem; color: #999; }


    /* Modals / Forms */
    .form-label { font-size:.85rem;font-weight:500;color:#555;margin-bottom:5px; }
    .form-control, .form-select { background: #fff; border:1px solid #ced4da; color: #333; border-radius:8px; padding:10px 14px; font-size:.9rem; }
    .form-control:focus, .form-select:focus { background: #fff; border-color:var(--ji-green); color: #333; box-shadow:none; }
    .btn-save { background:var(--ji-green);color:#fff;border:none;border-radius:8px;padding:10px 24px;font-weight:600;font-size:.95rem;cursor:pointer;width:100%; transition: .2s; }
    .btn-save:hover { background: #1ebe5d; }
  </style>
</head>
<body>

  <div class="top-bar">
    <div class="top-bar-left">
      <div class="brand"><span>Job</span>info – Dashboard</div>
      <div class="sub-label" id="topbar-name">Loading...</div>
    </div>
    <button class="btn-logout" onclick="logoutSeeker()">Logout</button>
  </div>

  <div class="container-mobile">
    

    <!-- Main Profile View -->
    <div id="profile-view">
      
      <!-- Profile Overview Card -->
      <div class="card-dark">
        <div class="profile-header">
          <div class="profile-info">
            <div class="avatar-circle" id="profile-avatar">MM</div>
            <div>
              <div class="profile-name" id="viewName">Loading...</div>
              <div class="profile-location" id="viewHeaderLocation">📍 —, —</div>
            </div>
          </div>
          <button class="btn-edit" onclick="toggleProfileEdit(true)">
            <i class="bi bi-pencil-fill" style="font-size:0.75rem;"></i> Edit Profile
          </button>
        </div>

        <div class="data-grid">
          <div>
            <div class="data-item-label">Age</div>
            <div class="data-item-value" id="viewAge">—</div>
          </div>
          <div>
            <div class="data-item-label">Gender</div>
            <div class="data-item-value" id="viewGender">—</div>
          </div>
          <div>
            <div class="data-item-label">Mobile</div>
            <div class="data-item-value" id="viewMobile">—</div>
          </div>
          <div>
            <div class="data-item-label">WhatsApp</div>
            <div class="data-item-value" id="viewWhatsApp">—</div>
          </div>
          <div>
            <div class="data-item-label">Category</div>
            <div class="data-item-value" id="viewCategory">—</div>
          </div>
          <div>
            <div class="data-item-label">Sub-Category</div>
            <div class="data-item-value" id="viewSubCategory">—</div>
          </div>
        </div>
      </div>

      <!-- Profile Strength Card -->
      <div class="card-dark">
        <div class="strength-header">
          <div class="strength-title">Profile strength</div>
          <div class="strength-pct" id="strengthPctText">0%</div>
        </div>
        <div class="strength-bar-bg">
          <div class="strength-bar-fill" id="strengthProgressBar" style="width: 0%;"></div>
        </div>
        <ul class="checklist" id="strengthChecklist">
          <!-- Populated by JS -->
        </ul>
      </div>

      <!-- CV Manager Card -->
      <div class="card-dark" id="cvManagerCard">
        <div class="strength-header">
          <div class="strength-title">Manage Resumes</div>
          <div class="strength-pct" id="cvCountBadge" style="color: #666; font-size: 0.9rem;">0 / 4</div>
        </div>
        
        <div id="cvListContainer">
          <!-- Populated by JS -->
        </div>

        <div class="cv-upload-box" id="cvUploadBtn" onclick="document.getElementById('cvFileInput').click()">
          <i class="bi bi-cloud-arrow-up"></i>
          <div>Upload New CV</div>
          <span id="cvUploadSub">PDF or DOCX max 10MB</span>
        </div>
        <input type="file" id="cvFileInput" accept=".pdf,.doc,.docx" style="display: none;" onchange="uploadResume(this)">
      </div>


    </div>

    <!-- Edit Profile Form (Hidden by default) -->
    <div id="profile-edit" style="display:none;">
      <div class="card-dark">
        <h4 class="mb-4" style="font-size: 1.15rem; font-weight: 600;">Edit Profile</h4>
        <form id="profileForm">
          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" id="profileName" required>
          </div>
          <div class="row mb-3 gx-2">
            <div class="col-6">
              <label class="form-label">Age</label>
              <input type="number" class="form-control" id="profileAge">
            </div>
            <div class="col-6">
              <label class="form-label">Gender</label>
              <select class="form-select" id="profileGender">
                <option value="" disabled selected>Select</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
              </select>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">District</label>
            <select class="form-select" id="profileDistrict">
              <option value="" disabled selected>Select a District</option>
              <option value="Thiruvananthapuram">Thiruvananthapuram</option>
              <option value="Kollam">Kollam</option>
              <option value="Pathanamthitta">Pathanamthitta</option>
              <option value="Alappuzha">Alappuzha</option>
              <option value="Kottayam">Kottayam</option>
              <option value="Idukki">Idukki</option>
              <option value="Ernakulam">Ernakulam</option>
              <option value="Thrissur">Thrissur</option>
              <option value="Palakkad">Palakkad</option>
              <option value="Malappuram">Malappuram</option>
              <option value="Kozhikode">Kozhikode</option>
              <option value="Wayanad">Wayanad</option>
              <option value="Kannur">Kannur</option>
              <option value="Kasaragod">Kasaragod</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Exact Location / Nearest Town</label>
            <input type="text" class="form-control" id="profileExactLocation">
          </div>
          <div class="mb-3">
            <label class="form-label">Job Category</label>
            <select class="form-select" id="profileCategory">
              <option value="" disabled selected>Select a Category</option>
              <option value="retail">Retail & Showrooms</option>
              <option value="hospitality">Hospitality & Food Service</option>
              <option value="healthcare">Healthcare & Caretaking</option>
              <option value="driving">Driving & Logistics</option>
              <option value="office_admin">Office & Admin</option>
              <option value="maintenance_technician">Maintenance & Technician</option>
              <option value="it_professional">IT & Professional</option>
              <option value="gulf_abroad">Gulf / Abroad Jobs</option>
              <option value="other">Other / General</option>
            </select>
          </div>
          <div class="mb-4">
            <label class="form-label">Alternate Mobile</label>
            <input type="tel" class="form-control" id="profileAltPhone">
          </div>
          
          <div class="d-flex gap-2">
            <button type="button" class="btn btn-outline-secondary w-50" style="border-radius:8px; font-weight:600;" onclick="toggleProfileEdit(false)">Cancel</button>
            <button type="button" class="btn-save w-50" id="btnSaveProfile" onclick="updateProfile()">Save</button>
          </div>
        </form>
      </div>
    </div>

  </div>

  <script src="assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/dashboard.js"></script>
</body>
</html>
