<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Dashboard - Jobinfo</title>
  
  <link href="assets/img/favicon.png" rel="icon">
  <link href="assets/img/apple-touch-icon.png" rel="apple-touch-icon">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/css/main.css" rel="stylesheet">
  
  <style>
    :root { --ji-green:#25d366; --ji-dark:#1a1a2e; --ji-bg:#f4f6fb; }
    body { background:var(--ji-bg); font-family:Roboto,sans-serif; }
    
    /* ── Top Bar ──────────────────────────────────── */
    .top-bar { background:var(--ji-dark);color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100; }
    .top-bar .brand { font-size:1.1rem;font-weight:700;text-decoration:none;color:#fff; }
    .top-bar .brand span { color:#e74c3c; } /* matching job-red context, or ji-green */
    .btn-logout { background:none;border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:8px;padding:5px 14px;font-size:.78rem;cursor:pointer;transition:all .2s; }
    .btn-logout:hover { background:rgba(255,255,255,.1); }

    /* ── Dashboard Cards & Tabs ───────────────────── */
    .card-dashboard { background:#fff;border-radius:14px;padding:24px;border:none;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:22px; }
    .card-dashboard h4 { font-size:1.1rem;font-weight:700;margin-bottom:20px; }
    
    .nav-pills { margin-bottom: 22px; }
    .nav-pills .nav-link { background:#fff;border:1px solid #dde1e7;border-radius:10px;color:#555;font-size:.88rem;font-weight:600;padding:8px 18px;margin-right:10px;transition:all .2s; }
    .nav-pills .nav-link:hover { background:#f9fafb; }
    .nav-pills .nav-link.active { background:var(--ji-dark);color:#fff;border-color:var(--ji-dark); }
    
    /* Form Elements */
    .form-label { font-size:.78rem;font-weight:600;color:#555;margin-bottom:5px; }
    .form-control { border:1px solid #dde1e7;border-radius:9px;padding:10px 14px;font-size:.9rem;outline:none;box-shadow:none;transition:border-color .2s; }
    .form-control:focus { border-color:var(--ji-green);box-shadow:0 0 0 3px rgba(37,211,102,.12); }
    .btn-save { background:var(--ji-green);color:#fff;border:none;border-radius:10px;padding:10px 24px;font-weight:700;font-size:.95rem;cursor:pointer;transition:background .2s; }
    .btn-save:hover { background:#1ebe5d;color:#fff; }

    /* Table */
    .table-container { border-radius:14px;overflow:hidden;border:1px solid #f0f2f5; }
    .table-dashboard { width:100%;margin-bottom:0;border-collapse:collapse; }
    .table-dashboard th { background:#f8f9fc;font-size:.69rem;font-weight:700;text-transform:uppercase;color:#888;letter-spacing:.05em;padding:12px 16px;text-align:left;border-bottom:2px solid #eef0f4;white-space:nowrap; }
    .table-dashboard td { padding:13px 16px;border-bottom:1px solid #f0f2f5;font-size:.87rem;vertical-align:middle;background:#fff; }
    .table-dashboard tr:last-child td { border-bottom:none; }
    .table-dashboard tr:hover td { background:#f9fafb; }

    /* Badges */
    .status-badge { padding:3px 10px;border-radius:12px;font-size:.75rem;font-weight:600; }
    .status-applied { background:#eaf4fb; color:#2471a3; }
    .status-shortlisted { background:#d6eaf8; color:#1a5276; }
    .status-rejected { background:#fadbd8; color:#922b21; }
  </style>
</head>
<body>

  <!-- Top bar -->
  <div class="top-bar">
    <a href="index.html" class="brand"><span style="color:#e74c3c">Job</span>info – Dashboard</a>
    <button class="btn-logout" onclick="logoutSeeker()"><i class="bi bi-box-arrow-right me-1"></i>Logout</button>
  </div>

  <main class="container py-4">

    <!-- Dashboard Tabs -->
    <ul class="nav nav-pills mb-4" id="dashboardTabs" role="tablist">
      <li class="nav-item" role="presentation">
        <button class="nav-link active" id="profile-tab" data-bs-toggle="pill" data-bs-target="#profile-pnl" type="button" role="tab">My Profile</button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" id="applications-tab" data-bs-toggle="pill" data-bs-target="#applications-pnl" type="button" role="tab">My Applications</button>
      </li>
    </ul>

    <div class="tab-content" id="dashboardTabsContent">
      
      <!-- Profile Tab -->
      <div class="tab-pane fade show active" id="profile-pnl" role="tabpanel">
        <div class="card-dashboard">
          <h4>Edit Profile</h4>
          <form id="profileForm">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" id="profileName" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Age</label>
                <input type="number" class="form-control" id="profileAge">
              </div>
              <div class="col-md-6">
                <label class="form-label">Post Office / Location</label>
                <input type="text" class="form-control" id="profilePostOffice">
              </div>
              <div class="col-md-6">
                <label class="form-label">PIN Code</label>
                <input type="text" class="form-control" id="profilePinCode" maxlength="6">
              </div>
              <div class="col-md-6">
                <label class="form-label">Job Category</label>
                <input type="text" class="form-control" id="profileCategory" placeholder="e.g. Retail, IT, Healthcare">
              </div>
              <div class="col-md-6">
                <label class="form-label">Alternate Phone</label>
                <input type="tel" class="form-control" id="profileAltPhone">
              </div>
              <div class="col-12 mt-4 text-end">
                <button type="button" class="btn-save" id="btnSaveProfile" onclick="updateProfile()">Save Changes</button>
              </div>
            </div>
          </form>
        </div>
      </div>

      <!-- Applications Tab -->
      <div class="tab-pane fade" id="applications-pnl" role="tabpanel">
        <div class="card-dashboard">
          <h4>Application History</h4>
          <div class="table-container">
            <table class="table-dashboard">
              <thead>
                <tr>
                  <th>Job Title</th>
                  <th>Company</th>
                  <th>Location</th>
                  <th>Date Applied</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody id="applicationsTableBody">
                <tr><td colspan="5" style="text-align:center;color:#888;padding:20px;">Loading applications...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </main>

  <script src="assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/dashboard.js"></script>
</body>
</html>
